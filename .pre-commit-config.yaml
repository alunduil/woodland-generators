# Pre-commit configuration for Woodland Generators
# This configuration runs various checks and formatters before each commit
# to maintain code quality and consistency.
#
# To install: pre-commit install
# To run manually: pre-commit run --all-files
# To update hooks: pre-commit autoupdate

# Global exclusions - applied to all hooks unless overridden
exclude: |
  (?x)^(
    node_modules/.*|
    dist/.*|
    build/.*|
    \.git/.*|
    \.vale/.*
  )$

repos:
  # Standard pre-commit hooks for common file issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git-related checks
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # Prevent files larger than 1MB
      - id: check-case-conflict

      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]

      # JSON/YAML validation
      - id: check-json
        exclude: '(\.devcontainer/.*\.json$|\.vscode/.*\.json$)' # DevContainer and VS Code files use JSONC (JSON with comments)
      - id: check-yaml
        exclude: '^\.github/workflows/' # GitHub Actions YAML can have some special syntax

      # Other useful checks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: '^src/.*\.ts$' # TypeScript source files with shebangs are compiled, not directly executed

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-d", "relaxed"]
        exclude: '^\.github/workflows/' # Skip GitHub Actions workflows

  # TOML formatting and linting with taplo
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint
        args: ["--no-schema"]

  # Prose linting with Vale
  - repo: https://github.com/errata-ai/vale
    rev: v3.14.1
    hooks:
      - id: vale
        files: \.(md|rst|txt)$
        types_or: [markdown, rst, plain-text]
        args: ["--config=.vale.ini"]

  # Lychee link checker (auto-installs the binary)
  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.24.2
    hooks:
      - id: lychee
        args: ["--config=lychee.toml", "--no-progress"]

  # Project-local hooks. Versions live in package.json devDependencies, so
  # there is nothing for Renovate's pre-commit manager to track here. These
  # require `npm ci` to have populated node_modules/.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --check
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss]
        exclude: |
          (?x)^(
            package-lock\.json|
            \.vscode/.*\.json
          )$
      - id: eslint
        name: eslint
        entry: npx eslint --max-warnings=0
        language: system
        files: \.(js|jsx|ts|tsx)$
      - id: typecheck
        name: typecheck
        entry: npm run check:types
        language: system
        pass_filenames: false
        types: [ts]
      - id: depcheck
        name: depcheck
        entry: npm run check:deps
        language: system
        pass_filenames: false
        files: ^(package\.json|package-lock\.json)$
