# Pre-commit configuration for Woodland Generators
# This configuration runs various checks and formatters before each commit
# to maintain code quality and consistency.
#
# To install: pre-commit install --hook-type pre-commit --hook-type commit-msg
# To run manually: pre-commit run --all-files
# To update hooks: pre-commit autoupdate

# Global exclusions - applied to all hooks unless overridden
exclude: |
  (?x)^(
    node_modules/.*|
    dist/.*|
    build/.*|
    \.git/.*|
    \.vale/.*|
    CHANGELOG\.md
  )$

repos:
  # Standard pre-commit hooks for common file issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git-related checks
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # Prevent files larger than 1MB
      - id: check-case-conflict

      # File formatting
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]

      # JSON/YAML validation
      - id: check-json
        exclude: '(\.devcontainer/.*\.json$|\.vscode/.*\.json$)' # DevContainer and VS Code files use JSONC (JSON with comments)
      - id: check-yaml

      # Other useful checks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: '^packages/.*/src/.*\.ts$' # TypeScript source files with shebangs are compiled, not directly executed

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-d", "relaxed"]

  # GitHub Actions workflow linting. actionlint owns workflow YAML validation
  # (schema, expression syntax, shellcheck integration); check-yaml and yamllint
  # now cover the basic parse/style smells on the same files.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # TOML formatting and linting with taplo. Version lives in package.json
  # devDependencies (Renovate-tracked via npm) rather than a pre-commit rev,
  # matching the project-local hooks below; requires `pnpm install` to have
  # populated node_modules.
  - repo: local
    hooks:
      - id: taplo-format
        name: taplo-format
        entry: pnpm exec taplo format
        language: system
        types: [toml]
      - id: taplo-lint
        name: taplo-lint
        entry: pnpm exec taplo lint --no-schema
        language: system
        types: [toml]

  # REUSE compliance: every tracked file must declare copyright + license
  # via inline SPDX headers or REUSE.toml annotations. The hook runs
  # `reuse lint` against the whole tree on every commit.
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse

  # Prose linting with Vale
  - repo: https://github.com/errata-ai/vale
    rev: v3.15.1
    hooks:
      - id: vale
        files: \.(md|rst|txt)$
        types_or: [markdown, rst, plain-text]
        args: ["--config=.vale.ini", "--minAlertLevel=error"]

  # Lychee link checker. Uses the system-installed binary (provisioned by
  # scripts/install-lychee.sh in the devcontainer and CI) rather than the
  # upstream hook's precompiled binary, which links against GLIBC 2.38 and
  # fails to run on Debian 12 hosts shipping GLIBC 2.36. The pinned version
  # lives in scripts/install-lychee.sh and is Renovate-tracked from there.
  - repo: local
    hooks:
      - id: lychee
        name: lychee
        entry: lychee --config=lychee.toml --no-progress
        language: system
        types: [markdown]

  # Conventional Commits validation - runs at the commit-msg stage to reject
  # non-conventional commit subjects. Requires `--hook-type commit-msg` at
  # install time.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  # Project-local hooks. Versions live in package.json devDependencies, so
  # there is nothing for Renovate's pre-commit manager to track here. These
  # require `pnpm install` to have populated node_modules/.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss]
        exclude: |
          (?x)^(
            pnpm-lock\.yaml|
            \.vscode/.*\.json
          )$
      - id: eslint
        name: eslint
        entry: pnpm exec eslint --max-warnings=0 --fix
        language: system
        files: \.(js|jsx|ts|tsx)$
      - id: typecheck
        name: typecheck
        entry: pnpm -r exec tsc --noEmit
        language: system
        pass_filenames: false
        types: [ts]
      - id: depcheck
        # Audits the root and every workspace package. Per-package ignores
        # live in each package's `.depcheckrc.json`; only the root needs one
        # today (depcheck and prettier are devDeps used via tool config, not
        # imports, so depcheck can't see them).
        name: depcheck
        entry: pnpm -r --include-workspace-root exec depcheck
        language: system
        pass_filenames: false
        files: (^|/)package\.json$|^pnpm-lock\.yaml$|^pnpm-workspace\.yaml$|(^|/)\.depcheckrc\.json$
      - id: workspace
        name: workspace
        entry: pnpm exec tsx scripts/validate-workspace.ts
        language: system
        pass_filenames: false
        files: ^(\.vscode/extensions\.json|\.devcontainer/devcontainer\.json|scripts/validate-workspace\.ts)$
      - id: validate-adrs
        name: validate-adrs
        entry: pnpm exec tsx scripts/validate-adrs.ts
        language: system
        pass_filenames: false
        files: ^(docs/adr/.*\.md|scripts/validate-adrs\.ts)$
