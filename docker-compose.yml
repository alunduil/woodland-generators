---
# Local Foundry VTT harness for verifying packages/foundry-module/.
# See packages/foundry-module/README.md for setup and usage.

services:
  foundry:
    image: felddy/foundryvtt:14.361.0@sha256:88399d7707a5ee548283a66947e54f69eaad68f27433c0f57c8940b44794fdfc
    # Foundry binds the license to the container hostname; pinning keeps the
    # license valid across `docker compose down` / `up` cycles.
    hostname: woodland-generators-foundry
    init: true
    ports:
      - "30000:30000"
    env_file:
      # Needed only on first run; a warm foundry-data volume runs without it.
      - path: .env
        required: false
    environment:
      CONTAINER_PRESERVE_CONFIG: "true"
      # Run link-module.sh from /srv/patches (outside /data) at startup.
      CONTAINER_PATCHES: "/srv/patches"
    volumes:
      - foundry-data:/data
      # Mount the package outside /data; the container patch symlinks it into
      # the modules directory. Mounting into /data directly makes Docker
      # pre-create the parents as root, which the non-root foundry user can't
      # then write under.
      - ./packages/foundry-module:/srv/module:ro
      - ./packages/foundry-module/scripts/foundry-link-module.sh:/srv/patches/link-module.sh:ro

volumes:
  foundry-data:
