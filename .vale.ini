# Vale configuration for Woodland Generators
# https://vale.sh/docs/topics/config/
#
# Note: The .vale/styles directory is checked into git but excluded
# from pre-commit checks to avoid linting the style configurations.
#
# Rule-tuning policy:
#   - Rules default to the severity their package ships. Demoting a rule
#     so it stops firing is the wrong fix; rewrite to comply instead.
#   - The only exceptions: dedupe duplicate rules across overlapping
#     packages, reaffirm identity/inclusion rules at `error`, and exempt
#     auto-generated content (CHANGELOG) from prose linting entirely.
#   - Prefer tuning a rule over expanding accept.txt when the term reflects
#     an established technical or domain convention. See accept.txt header.

# Core settings
StylesPath = .vale/styles

# List of packages to install
Packages = Microsoft, proselint, write-good, alex, Readability

# Set vocabulary to use
Vocab = Custom

# Markdown — pre-commit only runs vale on .md/.rst/.txt, so a per-format
# section here covers the lint surface. Disable duplicate rules from
# overlapping packages: write-good.Passive is the keeper over
# Microsoft.Passive; Vale.Spelling owns spelling over proselint.Spelling;
# Microsoft.Terms covers the cliché ground proselint.Cliches duplicates.
# Identity rules pinned to `error` so a future severity drop in the
# upstream package cannot silently weaken them.
[*.md]
BasedOnStyles = Vale, Microsoft, proselint, write-good, alex, Readability
Microsoft.Passive = NO
proselint.Cliches = NO
proselint.Spelling = NO
alex.Race = error
alex.Gender = error
alex.Sexual-orientation = error

# Configuration files - minimal checking
[*.{yml,yaml,json,toml}]
BasedOnStyles = Vale

# Code files - comments only
[*.{js,ts,jsx,tsx,py,java,c,cpp,h,hpp}]
BasedOnStyles = Vale
BlockIgnores = (?s) *(/\*.*?\*/)
TokenIgnores = (//.*)

# CHANGELOG — release-please auto-generates this; the format is dense and
# structured by design. Pre-commit excludes it globally; this block applies
# when vale runs directly. Disable Readability and stylistic rules so
# `vale CHANGELOG.md` doesn't produce noise on machine-written content.
[CHANGELOG.md]
Microsoft.Contractions = NO
Microsoft.FirstPerson = NO
Microsoft.HeadingColons = NO
Microsoft.Dashes = NO
Readability.AutomatedReadability = NO
Readability.ColemanLiau = NO
Readability.FleschKincaid = NO
Readability.FleschReadingEase = NO
Readability.GunningFog = NO
Readability.LIX = NO
Readability.SMOG = NO
