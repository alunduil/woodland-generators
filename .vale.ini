# Vale configuration for Woodland Generators
# https://vale.sh/docs/topics/config/
#
# Note: The .vale/styles directory is checked into git but excluded
# from pre-commit checks to avoid linting the style configurations.
#
# Rule-tuning policy (see docs/adr/ context):
#   - Identity/inclusion rules (alex.Race, alex.Gender, alex.Sexual-orientation)
#     stay at `error` everywhere.
#   - Stylistic Microsoft house rules (Dashes, HeadingColons) are demoted or
#     scoped off for technical docs where they conflict with conventions.
#   - Readability stays on for human-read docs (README, CONTRIBUTING, ADRs)
#     and is off where structure or jargon makes it noise (CHANGELOG).
#   - Prefer tuning a rule over expanding accept.txt when the term reflects an
#     established technical or domain convention. See accept.txt header.

# Core settings
StylesPath = .vale/styles

# List of packages to install
Packages = Microsoft, proselint, write-good, alex, Readability

# Set vocabulary to use
Vocab = Custom

# Markdown — pre-commit only runs vale on .md/.rst/.txt, so a per-format
# section here covers the lint surface. Disable duplicate rules from
# overlapping packages: write-good.Passive is the keeper over
# Microsoft.Passive; Vale.Spelling owns spelling over proselint.Spelling;
# Microsoft.Terms covers the cliché ground proselint.Cliches duplicates.
[*.md]
BasedOnStyles = Vale, Microsoft, proselint, write-good, alex, Readability
Microsoft.Contractions = warning
Microsoft.FirstPerson = suggestion
Microsoft.Dashes = suggestion
Microsoft.Passive = NO
proselint.Cliches = NO
proselint.Spelling = NO
write-good.Passive = warning
alex.Condescending = suggestion
alex.Race = error
alex.Gender = error
alex.Sexual-orientation = error

# Architecture Decision Records — read cold by future contributors, so
# Readability stays on. Headings with colons are idiomatic ADR practice
# ("## Decision: coexist with X"); em-dash spacing in list separators and
# table cells is also conventional. Disable those two rules here.
[docs/adr/*.md]
Microsoft.HeadingColons = NO
Microsoft.Dashes = NO

# How-to docs — Diátaxis conditional-imperative action. Same heading and
# dash conventions as ADRs.
[docs/how-to/*.md]
Microsoft.HeadingColons = NO
Microsoft.Dashes = NO

# Configuration files - minimal checking
[*.{yml,yaml,json,toml}]
BasedOnStyles = Vale

# Code files - comments only
[*.{js,ts,jsx,tsx,py,java,c,cpp,h,hpp}]
BasedOnStyles = Vale
BlockIgnores = (?s) *(/\*.*?\*/)
TokenIgnores = (//.*)

# CHANGELOG — structured release notes. Pre-commit excludes it globally;
# this block applies when vale runs directly. Readability rules and
# stylistic Microsoft rules are noise on dense, structured entries.
[CHANGELOG.md]
Microsoft.Contractions = suggestion
Microsoft.FirstPerson = NO
Microsoft.HeadingColons = NO
Microsoft.Dashes = NO
Readability.AutomatedReadability = NO
Readability.ColemanLiau = NO
Readability.FleschKincaid = NO
Readability.FleschReadingEase = NO
Readability.GunningFog = NO
Readability.LIX = NO
Readability.SMOG = NO
