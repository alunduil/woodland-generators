version = 1

# JSON and JSONC files cannot carry inline comment headers, so REUSE.toml
# is the only way to declare their SPDX information.
[[annotations]]
path = ["**/*.json", ".prettierrc"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"

# Markdown documentation. Inline HTML comment headers render visibly in
# some markdown viewers; REUSE.toml keeps the rendered output clean.
[[annotations]]
path = "**/*.md"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"

# Ignore-style config files (one pattern per line, comments often awkward).
[[annotations]]
path = [".gitignore", ".prettierignore", ".valeignore", ".env.example"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"

# Project license file at repo root (the LICENSES/MIT.txt template lives
# under LICENSES/ and is the SPDX-canonical text REUSE consults).
[[annotations]]
path = "LICENSE"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"

# Lock file managed by pnpm. Annotating in-band would be churned by every
# dependency update.
[[annotations]]
path = "pnpm-lock.yaml"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"

# Vendored Vale style packs pulled in by `vale sync`. Each pack carries
# its upstream author and license -- add a new stanza when adding a pack
# so additions and removals stay localised and a non-MIT pack surfaces in
# review rather than getting collapsed under an aggregate annotation.

[[annotations]]
path = ".vale/styles/Microsoft/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2018-2019 Joseph Kato"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ".vale/styles/proselint/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2019 errata.ai"
SPDX-License-Identifier = "BSD-3-Clause"

[[annotations]]
path = ".vale/styles/write-good/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2019 errata.ai"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ".vale/styles/alex/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2020 errata.ai"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = ".vale/styles/Readability/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2021 errata.ai"
SPDX-License-Identifier = "MIT"

# Project's own custom Vale vocabulary, not vendored.
[[annotations]]
path = ".vale/styles/config/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025-2026 Alex Brandt"
SPDX-License-Identifier = "MIT"
