name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test (${{ matrix.package }}, Node ${{ matrix.node-version }})
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # All supported LTS via setup-node nvm aliases — auto-rotates.
        # `lts/-2` drifts onto a just-EOL'd line ~6 mo/yr by design (between
        # April EOL and October's new LTS); accepted as the cost of full
        # supported-line coverage. Codecov gates on `lts/*` to anchor the
        # signal to active LTS rather than rotating through maintenance.
        node-version: ["lts/-2", "lts/-1", "lts/*"]
        package: [core, cli]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests with coverage
        run: pnpm --filter @woodland-generators/${{ matrix.package }} run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 'lts/*'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./packages/${{ matrix.package }}/coverage/lcov.info
          flags: ${{ matrix.package }}
          name: codecov-${{ matrix.package }}
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: always() && matrix.node-version == 'lts/*'
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          files: ./packages/${{ matrix.package }}/test-results/junit.xml
          flags: ${{ matrix.package }}
          name: test-results-${{ matrix.package }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build TypeScript
        run: pnpm run build

      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            dist/
            packages/*/dist/
          retention-days: 7
