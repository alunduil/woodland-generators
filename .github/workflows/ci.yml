name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test (Node ${{ matrix.node-version }})
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # All supported LTS via setup-node nvm aliases — auto-rotates.
        # `lts/-2` drifts onto a just-EOL'd line ~6 mo/yr by design (between
        # April EOL and October's new LTS); accepted as the cost of full
        # supported-line coverage. Codecov gates on `lts/*` to anchor the
        # signal to active LTS rather than rotating through maintenance.
        node-version: ["lts/-2", "lts/-1", "lts/*"]
        include:
          - node-version: "lts/*"
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests with coverage
        run: pnpm run test:coverage

      # Per-package jest writes SF: lines relative to packages/<pkg>/, so
      # uploaded paths land as src/foo.ts and miss codecov.yml's repo-relative
      # ignore patterns and Codecov's PR diff overlay. Prefix each lcov in
      # place so paths align with the rest of the repo.
      - name: Rewrite lcov paths to repo-relative
        if: matrix.coverage
        run: |
          set -euo pipefail
          shopt -s nullglob
          for lcov in packages/*/coverage/lcov.info; do
            pkg=$(dirname "$(dirname "$lcov")")
            sed -i "s|^SF:|SF:${pkg}/|" "$lcov"
          done

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./packages/core/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: always() && matrix.coverage
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          files: ./packages/core/test-results/junit.xml
          flags: unittests
          name: test-results
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build TypeScript
        run: pnpm run build

      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            dist/
            packages/*/dist/
          retention-days: 7
