name: Benchmarks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    # Skip bench on PRs that don't touch perf-relevant code.
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "jest.benchmark.config.json"
      - "scripts/process-benchmarks.ts"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  bench:
    runs-on: ubuntu-latest
    name: Performance Benchmarks
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download previous benchmark data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Run benchmarks
        run: pnpm run bench

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Woodland Generators Performance"
          tool: "benchmarkjs"
          output-file-path: benchmarks/result-benchmarkjs.txt
          external-data-json-path: ./cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@alunduil"
          summary-always: true
          max-items-in-chart: 100
