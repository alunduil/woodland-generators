name: Benchmarks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    # Skip bench on PRs that don't touch perf-relevant code.
    paths:
      - "packages/*/src/**"
      - "packages/*/test/**"
      - "packages/*/jest.benchmark.config.json"
      - "packages/*/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/process-benchmarks.ts"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  bench:
    runs-on: ubuntu-latest
    name: Performance Benchmarks
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download previous benchmark data
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Run benchmarks
        run: pnpm run bench

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Woodland Generators Performance"
          tool: "benchmarkjs"
          output-file-path: packages/core/benchmarks/result-benchmarkjs.txt
          external-data-json-path: ./cache/benchmark-data.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: "@alunduil"
          summary-always: true
          max-items-in-chart: 100
