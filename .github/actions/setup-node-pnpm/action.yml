name: Setup Node.js + pnpm
description: Activate pnpm, install Node.js with pnpm cache, and install workspace dependencies from the frozen lockfile.

inputs:
  node-version:
    description: Node.js version passed to actions/setup-node.
    required: false
    default: "lts/*"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: Rewrite GitHub SSH URLs to HTTPS
      shell: bash
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
