coverage:
  status:
    project:
      default:
        threshold: 1%
    patch:
      default:
        threshold: 1%

ignore:
  - "dist/"
  - "coverage/"
  - "benchmarks/"
  - "scripts/"
  - "test/"
  - "test-results/"
  - "**/*.d.ts"
  - "**/*.test.ts"
  - "**/*.bench.ts"
  # cli coverage isn't uploaded yet — #216 wires the per-package matrix.
  - "packages/cli/**"
  - "packages/*/src/logging/pino-pretty-transport.js"
