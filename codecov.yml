coverage:
  status:
    project:
      default:
        threshold: 1%
    patch:
      default:
        threshold: 1%

ignore:
  - "dist/"
  - "coverage/"
  - "benchmarks/"
  - "scripts/"
  - "test/"
  - "test-results/"
  - "**/*.d.ts"
  - "**/*.test.ts"
  - "**/*.bench.ts"
  - "packages/cli/src/cli.ts"
  - "packages/*/src/logging/pino-pretty-transport.js"
